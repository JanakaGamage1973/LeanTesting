<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeanTest - Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' } } }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen">
    <header id="header" class="h-16 sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 z-40"></header>

    <main class="max-w-4xl mx-auto px-6 py-8 page-enter">
        <!-- Score Summary -->
        <div id="score-summary" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8 mb-6 text-center">
            <div id="score-icon" class="size-20 rounded-full mx-auto mb-4 flex items-center justify-center"></div>
            <div id="score-percentage" class="text-4xl font-bold mb-1"></div>
            <div id="score-fraction" class="text-[12px] text-slate-500 mb-2"></div>
            <div id="score-badge" class="mb-4"></div>
            <div id="score-details" class="flex items-center justify-center gap-6 text-[11px] text-slate-500"></div>
        </div>

        <!-- Difficulty Breakdown -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div id="easy-breakdown" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"></div>
            <div id="medium-breakdown" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"></div>
            <div id="hard-breakdown" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"></div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <a id="retake-link" href="#" class="bg-primary text-white px-6 py-2.5 rounded-xl text-[12px] font-bold hover:bg-indigo-600 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">replay</span>
                Retake Test
            </a>
            <a id="progress-link" href="#" class="border border-slate-200 text-slate-500 px-6 py-2.5 rounded-xl text-[12px] font-medium hover:bg-slate-50 transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">trending_up</span>
                View Progress
            </a>
            <a id="dashboard-link" href="#" class="border border-slate-200 text-slate-500 px-6 py-2.5 rounded-xl text-[12px] font-medium hover:bg-slate-50 transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">home</span>
                All Tests
            </a>
        </div>

        <!-- Question Review -->
        <div class="mb-4">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Question Review</h2>
        </div>
        <div id="question-review" class="space-y-4"></div>
    </main>

    <script type="module">
        import { requireAuth, navigateTo, BASE_PATH } from './js/auth.js';
        import { renderStudentHeader, initLogout, badge, difficultyBadge } from './js/ui.js';
        import { db } from './js/firebase-config.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js';
        import { calculateBreakdown } from './js/quiz-engine.js';

        initLogout();

        const params = new URLSearchParams(window.location.search);
        const attemptId = params.get('attemptId');
        if (!attemptId) navigateTo('/dashboard.html');

        try {
            const user = await requireAuth();
            document.getElementById('header').innerHTML = renderStudentHeader(user);

            const attemptDoc = await getDoc(doc(db, 'attempts', attemptId));
            if (!attemptDoc.exists()) { navigateTo('/dashboard.html'); return; }
            const attempt = attemptDoc.data();

            // Fetch test name
            const testDoc = await getDoc(doc(db, 'tests', attempt.testId));
            const testName = testDoc.exists() ? testDoc.data().name : 'Test';

            // Links
            document.getElementById('retake-link').href = `${BASE_PATH}/quiz.html?testId=${attempt.testId}`;
            document.getElementById('progress-link').href = `${BASE_PATH}/progress.html`;
            document.getElementById('dashboard-link').href = `${BASE_PATH}/dashboard.html`;

            // Score
            const pct = attempt.percentage;
            const passed = pct >= 70;
            const scoreColor = pct >= 70 ? 'text-emerald-600' : pct >= 50 ? 'text-amber-600' : 'text-red-600';
            const iconBg = pct >= 70 ? 'bg-emerald-50' : pct >= 50 ? 'bg-amber-50' : 'bg-red-50';
            const icon = pct >= 70 ? 'emoji_events' : pct >= 50 ? 'thumb_up' : 'trending_down';
            const iconColor = pct >= 70 ? 'text-emerald-500' : pct >= 50 ? 'text-amber-500' : 'text-red-500';

            document.getElementById('score-icon').className = `size-20 rounded-full mx-auto mb-4 flex items-center justify-center ${iconBg}`;
            document.getElementById('score-icon').innerHTML = `<span class="material-symbols-outlined ${iconColor} text-[40px]">${icon}</span>`;
            document.getElementById('score-percentage').className = `text-4xl font-bold mb-1 ${scoreColor}`;
            document.getElementById('score-percentage').textContent = `${pct}%`;
            document.getElementById('score-fraction').textContent = `${attempt.score} out of ${attempt.totalQuestions} correct`;
            document.getElementById('score-badge').innerHTML = badge(
                passed ? 'Passed' : 'Needs Improvement',
                passed ? 'emerald' : 'red'
            );

            const minutes = Math.floor(attempt.timeTaken / 60);
            const seconds = attempt.timeTaken % 60;
            const statusText = attempt.status === 'timed_out' ? 'Time expired' : 'Completed';

            document.getElementById('score-details').innerHTML = `
                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">timer</span> ${minutes}m ${seconds}s</span>
                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">quiz</span> ${testName}</span>
                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">check_circle</span> ${statusText}</span>
            `;

            // Breakdown
            const breakdown = calculateBreakdown(attempt.answers);
            renderBreakdown('easy-breakdown', 'Easy', breakdown.easy, 'emerald');
            renderBreakdown('medium-breakdown', 'Medium', breakdown.medium, 'amber');
            renderBreakdown('hard-breakdown', 'Hard', breakdown.hard, 'red');

            // Question Review
            document.getElementById('question-review').innerHTML = attempt.answers.map((a, i) => {
                const options = [
                    { letter: 'A', text: a.optionA },
                    { letter: 'B', text: a.optionB },
                    { letter: 'C', text: a.optionC },
                    { letter: 'D', text: a.optionD }
                ];
                return `
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 relative overflow-hidden">
                        <div class="status-bar ${a.isCorrect ? 'bg-emerald-500' : 'bg-red-500'}"></div>
                        <div class="flex items-center gap-2 mb-3 pl-2">
                            ${difficultyBadge(a.difficulty)}
                            <span class="text-[10px] text-slate-400 font-medium">Question ${i + 1}</span>
                            ${a.isCorrect
                                ? '<span class="ml-auto px-2 py-0.5 rounded-full text-[9px] font-bold bg-emerald-50 text-emerald-700">CORRECT</span>'
                                : '<span class="ml-auto px-2 py-0.5 rounded-full text-[9px] font-bold bg-red-50 text-red-600">INCORRECT</span>'}
                        </div>
                        <p class="text-[12px] font-bold text-slate-800 mb-4 pl-2">${a.questionText}</p>
                        <div class="space-y-2 pl-2">
                            ${options.map(o => {
                                const isCorrect = o.letter === a.correctAnswer;
                                const isSelected = o.letter === a.selectedAnswer;
                                let cls = 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-[12px] ';
                                if (isCorrect) cls += 'bg-emerald-50 text-emerald-700 font-semibold border border-emerald-200';
                                else if (isSelected && !isCorrect) cls += 'bg-red-50 text-red-600 font-semibold border border-red-200';
                                else cls += 'text-slate-500 bg-slate-50 border border-transparent';
                                const icon = isCorrect ? '<span class="material-symbols-outlined text-emerald-500 text-[16px]">check_circle</span>'
                                    : isSelected ? '<span class="material-symbols-outlined text-red-500 text-[16px]">cancel</span>'
                                    : '<span class="size-4"></span>';
                                return `<div class="${cls}">${icon}<span class="font-bold text-[11px] w-5">${o.letter}.</span>${o.text}</div>`;
                            }).join('')}
                        </div>
                        ${!a.selectedAnswer ? '<p class="text-[10px] text-slate-400 mt-2 pl-2 italic">Not answered</p>' : ''}
                    </div>`;
            }).join('');

        } catch (e) {
            console.error(e);
        }

        function renderBreakdown(elId, label, data, color) {
            const pct = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
            const colors = { emerald: 'bg-emerald-500', amber: 'bg-amber-500', red: 'bg-red-500' };
            document.getElementById(elId).innerHTML = `
                <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">${label}</div>
                <div class="text-xl font-bold text-slate-800">${data.correct}/${data.total}</div>
                <div class="progress-bar mt-2">
                    <div class="progress-bar-fill ${colors[color]}" style="width: ${pct}%"></div>
                </div>
                <div class="text-[10px] text-slate-400 mt-1">${pct}%</div>
            `;
        }
    </script>
</body>
</html>
