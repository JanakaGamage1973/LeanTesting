<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeanTest - Initial Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' } } }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
    <div class="page-enter w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="size-16 bg-gradient-to-br from-primary to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-white text-[32px]">settings</span>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Initial Setup</h1>
            <p class="text-[12px] text-slate-400 mt-1">Create your first admin account to get started</p>
        </div>

        <!-- Already setup message -->
        <div id="already-setup" class="hidden bg-white rounded-2xl border border-slate-100 shadow-sm p-6 text-center">
            <span class="material-symbols-outlined text-emerald-500 text-4xl mb-2">check_circle</span>
            <h2 class="text-sm font-bold text-slate-800 mb-1">Already Configured</h2>
            <p class="text-[12px] text-slate-500 mb-4">An admin account already exists. Please sign in.</p>
            <a href="index.html" class="inline-block bg-primary text-white px-6 py-2 rounded-xl text-[12px] font-bold hover:bg-indigo-600 transition-colors">Go to Login</a>
        </div>

        <!-- Setup form -->
        <div id="setup-form-container" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <form id="setup-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Admin Username</label>
                    <input type="text" id="admin-username" required pattern="[a-zA-Z0-9_]+"
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="admin" value="admin" />
                </div>
                <div>
                    <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Display Name</label>
                    <input type="text" id="admin-name" required
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="Administrator" />
                </div>
                <div>
                    <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Password</label>
                    <input type="password" id="admin-password" required minlength="6"
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="Min 6 characters" />
                </div>
                <div>
                    <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Confirm Password</label>
                    <input type="password" id="admin-password-confirm" required minlength="6"
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="Re-enter password" />
                </div>
                <div id="error-msg" class="hidden text-[11px] text-red-500 bg-red-50 px-3 py-2 rounded-lg"></div>
                <button type="submit" id="setup-btn"
                    class="w-full bg-primary text-white px-4 py-2.5 rounded-xl text-[12px] font-bold hover:bg-indigo-600 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">rocket_launch</span>
                    Create Admin & Launch
                </button>
            </form>
        </div>

        <!-- Success message -->
        <div id="success-msg" class="hidden bg-white rounded-2xl border border-slate-100 shadow-sm p-6 text-center">
            <span class="material-symbols-outlined text-emerald-500 text-4xl mb-2">check_circle</span>
            <h2 class="text-sm font-bold text-slate-800 mb-1">Setup Complete!</h2>
            <p class="text-[12px] text-slate-500 mb-4">Your admin account has been created. Redirecting to login...</p>
        </div>
    </div>

    <script type="module">
        import { app, auth, db, EMAIL_DOMAIN } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js';
        import { collection, getDocs, query, where, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js';

        const formContainer = document.getElementById('setup-form-container');
        const alreadySetup = document.getElementById('already-setup');

        // Check if admin exists
        try {
            const usersSnap = await getDocs(collection(db, 'users'));
            let hasAdmin = false;
            usersSnap.forEach(d => { if (d.data().role === 'admin') hasAdmin = true; });
            if (hasAdmin) {
                formContainer.classList.add('hidden');
                alreadySetup.classList.remove('hidden');
                throw new Error('Already setup');
            }
        } catch (e) {
            if (e.message === 'Already setup') return;
            // If we can't check (permissions), show the form anyway
            console.log('Could not check for existing admin, showing form');
        }

        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');

            const username = document.getElementById('admin-username').value.trim();
            const displayName = document.getElementById('admin-name').value.trim();
            const password = document.getElementById('admin-password').value;
            const confirmPassword = document.getElementById('admin-password-confirm').value;

            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('setup-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span> Setting up...';

            try {
                const email = `${username.toLowerCase()}${EMAIL_DOMAIN}`;
                const credential = await createUserWithEmailAndPassword(auth, email, password);

                await setDoc(doc(db, 'users', credential.user.uid), {
                    username: username.toLowerCase(),
                    email,
                    displayName,
                    role: 'admin',
                    createdAt: serverTimestamp(),
                    createdBy: 'setup',
                    isActive: true
                });

                await signOut(auth);

                formContainer.classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (err) {
                console.error(err);
                let msg = 'Setup failed: ' + err.message;
                if (err.code === 'auth/email-already-in-use') msg = 'This username already exists';
                if (err.code === 'auth/weak-password') msg = 'Password must be at least 6 characters';
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">rocket_launch</span> Create Admin & Launch';
            }
        });
    </script>
</body>
</html>
