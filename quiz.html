<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>LeanTest - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' } } }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Quiz Header -->
    <header class="h-16 sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 z-40">
        <div class="flex items-center justify-between h-full px-6 max-w-5xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="size-10 bg-gradient-to-br from-primary to-indigo-600 rounded-xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-[20px]">school</span>
                </div>
                <div>
                    <div id="test-name" class="text-sm font-bold text-slate-800">Loading...</div>
                    <div id="question-counter" class="text-[10px] text-slate-400 font-medium">Question 1 of 30</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="timer" class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl">
                    <span class="material-symbols-outlined text-[18px] text-slate-500">timer</span>
                    <span id="timer-display" class="text-sm font-bold text-slate-800 tabular-nums">30:00</span>
                </div>
                <button id="submit-btn" class="bg-primary text-white px-4 py-2 rounded-xl text-[11px] font-bold hover:bg-indigo-600 shadow-lg shadow-primary/20 transition-all hidden">
                    Submit Test
                </button>
            </div>
        </div>
    </header>

    <!-- Loading State -->
    <div id="loading" class="flex flex-col items-center justify-center py-20">
        <span class="material-symbols-outlined text-primary text-4xl animate-spin mb-4">progress_activity</span>
        <p class="text-sm font-medium text-slate-400">Preparing your test...</p>
    </div>

    <!-- Quiz Content -->
    <main id="quiz-content" class="max-w-3xl mx-auto px-6 py-8 page-enter hidden">
        <!-- Question Card -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
                <span id="question-number" class="text-[10px] text-slate-400 font-medium"></span>
            </div>
            <h2 id="question-text" class="text-sm font-bold text-slate-800 leading-relaxed mb-6"></h2>
            <div id="options" class="space-y-3"></div>
        </div>

        <!-- Navigation -->
        <div class="flex items-center justify-between">
            <button id="prev-btn" class="flex items-center gap-2 border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-[11px] font-medium hover:bg-slate-50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Previous
            </button>
            <button id="next-btn" class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-xl text-[11px] font-bold hover:bg-indigo-600 shadow-lg shadow-primary/20 transition-all">
                Next
                <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
            </button>
        </div>

        <!-- Question Grid -->
        <div class="mt-6 bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">Questions</div>
            <div id="question-grid" class="grid grid-cols-10 gap-2"></div>
            <div class="flex items-center gap-4 mt-4 pt-3 border-t border-slate-100">
                <span class="flex items-center gap-1.5 text-[10px] text-slate-400">
                    <span class="size-3 rounded bg-primary"></span> Current
                </span>
                <span class="flex items-center gap-1.5 text-[10px] text-slate-400">
                    <span class="size-3 rounded bg-emerald-500"></span> Answered
                </span>
                <span class="flex items-center gap-1.5 text-[10px] text-slate-400">
                    <span class="size-3 rounded bg-slate-200"></span> Unanswered
                </span>
            </div>
        </div>
    </main>

    <script>
        (async function() {
            // Layer 3: Guard against double execution (e.g., page reload or script re-run)
            if (window.__quizInitialized) {
                console.log('[Quiz] Already initialized, skipping duplicate execution');
                return;
            }
            window.__quizInitialized = true;

            function showLoadError(msg) {
                document.getElementById('loading').innerHTML =
                    '<span class="material-symbols-outlined text-red-300 text-4xl mb-2">error</span>' +
                    '<p class="text-sm font-medium text-slate-500 mb-1">Failed to load quiz</p>' +
                    '<p class="text-[11px] text-red-400 mb-4 max-w-lg mx-auto break-words">' + msg + '</p>';
            }

            try {
                // Cache-bust quiz-engine.js to ensure latest question selection logic
                var cacheBust = '?t=' + Date.now();
                var [authModule, configModule, firestoreModule, quizModule, uiModule] = await Promise.all([
                    import('./js/auth.js'),
                    import('./js/firebase-config.js'),
                    import('https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js'),
                    import('./js/quiz-engine.js' + cacheBust),
                    import('./js/ui.js')
                ]);

                var requireAuth = authModule.requireAuth;
                var navigateTo = authModule.navigateTo;
                var BASE_PATH = authModule.BASE_PATH;
                var db = configModule.db;
                var doc = firestoreModule.doc;
                var getDoc = firestoreModule.getDoc;
                var collection = firestoreModule.collection;
                var fsQuery = firestoreModule.query;
                var where = firestoreModule.where;
                var getDocs = firestoreModule.getDocs;
                var selectQuestions = quizModule.selectQuestions;
                var QuizTimer = quizModule.QuizTimer;
                var createAttempt = quizModule.createAttempt;
                var submitAttempt = quizModule.submitAttempt;
                var saveQuizState = quizModule.saveQuizState;
                var loadQuizState = quizModule.loadQuizState;
                var clearQuizState = quizModule.clearQuizState;
                var showToast = uiModule.showToast;
                var showModal = uiModule.showModal;

                var params = new URLSearchParams(window.location.search);
                var testId = params.get('testId');

                if (!testId) {
                    navigateTo('/dashboard.html');
                    return;
                }

                var user = await requireAuth();

                // Fetch test config
                var testDoc = await getDoc(doc(db, 'tests', testId));
                if (!testDoc.exists()) {
                    showToast('Test not found', 'error');
                    navigateTo('/dashboard.html');
                    return;
                }
                var test = testDoc.data();
                document.getElementById('test-name').textContent = test.name;

                var questions, attemptId, answers;
                var currentIndex = 0;
                var resumedTimer = null;

                // ─── Layer 1: Resume existing in-progress attempt ───
                // Uses localStorage to track the attemptId (single doc read instead of collection query)
                var existingAttempt = null;
                var savedAttemptId = null;
                try { savedAttemptId = localStorage.getItem('quiz_attempt_' + testId); } catch(e) {}

                if (savedAttemptId) {
                    console.log('[Quiz] Found saved attemptId in localStorage:', savedAttemptId);
                    var attemptDoc = await getDoc(doc(db, 'attempts', savedAttemptId));
                    if (attemptDoc.exists()) {
                        var ad = attemptDoc.data();
                        if (ad.status === 'in_progress' && ad.userId === user.uid) {
                            existingAttempt = { id: savedAttemptId, data: ad };
                        }
                    }
                }

                // If the existing attempt has expired (time ran out), auto-submit it and start fresh
                if (existingAttempt) {
                    var durationSecs = (test.duration || 30) * 60;
                    if (existingAttempt.data.startedAt && existingAttempt.data.startedAt.seconds) {
                        var elapsedSecs = Math.floor(Date.now() / 1000) - existingAttempt.data.startedAt.seconds;
                        if (elapsedSecs >= durationSecs) {
                            console.log('[Quiz] Found EXPIRED in-progress attempt, auto-submitting...');
                            try {
                                await submitAttempt(existingAttempt.id, existingAttempt.data.answers, 0, durationSecs);
                                clearQuizState(existingAttempt.id);
                            } catch (expErr) {
                                console.warn('[Quiz] Failed to auto-submit expired attempt:', expErr);
                            }
                            existingAttempt = null; // Fall through to create new attempt
                        }
                    }
                }

                if (existingAttempt) {
                    // Resume existing attempt — keeps original question count intact
                    console.log('[Quiz] RESUMING existing attempt:', existingAttempt.id,
                        'with', existingAttempt.data.answers.length, 'questions');
                    attemptId = existingAttempt.id;
                    answers = existingAttempt.data.answers;

                    // Reconstruct questions array from attempt's stored answers
                    questions = answers.map(function(a) {
                        return {
                            id: a.questionId,
                            question: a.questionText,
                            optionA: a.optionA,
                            optionB: a.optionB,
                            optionC: a.optionC,
                            optionD: a.optionD,
                            correctAnswer: a.correctAnswer,
                            difficulty: a.difficulty
                        };
                    });

                    // Restore timer from localStorage if available
                    var savedState = loadQuizState(attemptId);
                    if (savedState && savedState.remainingSeconds > 0) {
                        resumedTimer = savedState.remainingSeconds;
                        console.log('[Quiz] Restoring timer:', resumedTimer, 'seconds remaining');
                    } else {
                        // Estimate remaining time from attempt start time
                        var durationSecs = (test.duration || 30) * 60;
                        if (existingAttempt.data.startedAt && existingAttempt.data.startedAt.seconds) {
                            var elapsed = Math.floor(Date.now() / 1000) - existingAttempt.data.startedAt.seconds;
                            var remaining = Math.max(0, durationSecs - elapsed);
                            resumedTimer = remaining;
                            console.log('[Quiz] Estimated timer from startedAt:', remaining, 'seconds remaining');
                        }
                    }
                } else {
                    // New attempt — select questions fresh
                    console.log('[Quiz] No existing attempt, selecting questions...');
                    questions = await selectQuestions(testId, test);

                    // ─── Layer 2: Inline fill-up safety net ───
                    // If selectQuestions returned fewer than configured (e.g., cached module
                    // without fill-up logic), fill up by querying Firestore directly
                    var totalTarget = test.totalQuestions || 30;
                    if (questions.length < totalTarget && questions.length > 0) {
                        console.log('[Quiz] INLINE FILL-UP: got', questions.length, 'need', totalTarget);
                        try {
                            var folderSvc = await import('./js/folder-service.js');
                            if (test.folderId) {
                                var allFolders = await folderSvc.loadAllFolders();
                                var folderIds = folderSvc.getDescendantFolderIdsLocal(test.folderId, allFolders);
                                var chunks = folderSvc.chunkArray(folderIds, 30);
                                var existingIds = {};
                                questions.forEach(function(q) { existingIds[q.id] = true; });
                                var extraDocs = [];

                                for (var ci = 0; ci < chunks.length; ci++) {
                                    var snap = await getDocs(fsQuery(
                                        collection(db, 'questions'),
                                        where('folderId', 'in', chunks[ci])
                                    ));
                                    snap.forEach(function(d) {
                                        var qd = d.data();
                                        if (!existingIds[d.id] && qd.isActive) {
                                            extraDocs.push({ id: d.id, qd: qd });
                                        }
                                    });
                                }

                                // Shuffle extra questions
                                for (var si = extraDocs.length - 1; si > 0; si--) {
                                    var sj = Math.floor(Math.random() * (si + 1));
                                    var tmp = extraDocs[si]; extraDocs[si] = extraDocs[sj]; extraDocs[sj] = tmp;
                                }

                                var fillNeeded = totalTarget - questions.length;
                                for (var fi = 0; fi < Math.min(fillNeeded, extraDocs.length); fi++) {
                                    var ed = extraDocs[fi];
                                    questions.push({
                                        id: ed.id, question: ed.qd.question,
                                        optionA: ed.qd.optionA, optionB: ed.qd.optionB,
                                        optionC: ed.qd.optionC, optionD: ed.qd.optionD,
                                        correctAnswer: ed.qd.correctAnswer,
                                        difficulty: ed.qd.difficulty,
                                        folderId: ed.qd.folderId, isActive: ed.qd.isActive
                                    });
                                }
                                console.log('[Quiz] After inline fill-up:', questions.length, 'questions');
                            }
                        } catch (fillErr) {
                            console.warn('[Quiz] Inline fill-up failed:', fillErr);
                        }
                    }

                    if (questions.length === 0) {
                        showToast('No questions available for this test', 'error');
                        navigateTo('/dashboard.html');
                        return;
                    }

                    console.log('[Quiz] Creating new attempt with', questions.length, 'questions');
                    var attempt = await createAttempt(user.uid, testId, questions);
                    attemptId = attempt.id;
                    answers = attempt.answers;
                    // Save attemptId for fast resume on page reload
                    try { localStorage.setItem('quiz_attempt_' + testId, attemptId); } catch(e) {}
                }

                // Init timer
                var duration = test.duration || 30;
                var timer = new QuizTimer(duration, onTimerTick, onTimerExpire);
                if (resumedTimer !== null) {
                    timer.setRemaining(resumedTimer);
                }

                // Show quiz
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('quiz-content').classList.remove('hidden');
                document.getElementById('submit-btn').classList.remove('hidden');

                console.log('[Quiz] Rendering quiz with', questions.length, 'questions, attempt:', attemptId);

                renderQuestion();
                renderGrid();
                timer.start();

                function onTimerTick(seconds) {
                    var display = document.getElementById('timer-display');
                    var container = document.getElementById('timer');
                    var m = String(Math.floor(seconds / 60)).padStart(2, '0');
                    var s = String(seconds % 60).padStart(2, '0');
                    display.textContent = m + ':' + s;

                    if (seconds <= 60) {
                        container.classList.add('bg-red-50');
                        container.classList.remove('bg-slate-50');
                        display.classList.add('text-red-600', 'timer-warning');
                        display.classList.remove('text-slate-800');
                    } else if (seconds <= 300) {
                        container.classList.add('bg-amber-50');
                        container.classList.remove('bg-slate-50');
                        display.classList.add('text-amber-600');
                        display.classList.remove('text-slate-800');
                    }

                    // Auto-save every 30 seconds
                    if (seconds % 30 === 0) {
                        saveQuizState(attemptId, answers, seconds, questions.map(function(q) { return q.id; }));
                    }
                }

                function onTimerExpire() {
                    doSubmit(true);
                }

                function renderQuestion() {
                    var q = questions[currentIndex];
                    var a = answers[currentIndex];

                    document.getElementById('question-counter').textContent = 'Question ' + (currentIndex + 1) + ' of ' + questions.length;
                    document.getElementById('question-number').textContent = 'Question ' + (currentIndex + 1);
                    document.getElementById('question-text').textContent = q.question;

                    var optLetters = ['A', 'B', 'C', 'D'];
                    var optKeys = ['optionA', 'optionB', 'optionC', 'optionD'];
                    document.getElementById('options').innerHTML = optLetters.map(function(letter, i) {
                        return '<div class="quiz-option">' +
                            '<input type="radio" name="answer" id="opt-' + letter + '" value="' + letter + '" ' + (a.selectedAnswer === letter ? 'checked' : '') + ' />' +
                            '<label for="opt-' + letter + '">' +
                                '<span class="option-letter">' + letter + '</span>' +
                                '<span>' + q[optKeys[i]] + '</span>' +
                            '</label>' +
                        '</div>';
                    }).join('');

                    // Bind option clicks
                    document.querySelectorAll('input[name="answer"]').forEach(function(input) {
                        input.addEventListener('change', function() {
                            answers[currentIndex].selectedAnswer = input.value;
                            renderGrid();
                        });
                    });

                    // Navigation buttons
                    document.getElementById('prev-btn').disabled = currentIndex === 0;
                    var nextBtn = document.getElementById('next-btn');
                    if (currentIndex === questions.length - 1) {
                        nextBtn.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span> Finish';
                    } else {
                        nextBtn.innerHTML = 'Next <span class="material-symbols-outlined text-[16px]">arrow_forward</span>';
                    }

                    renderGrid();
                }

                function renderGrid() {
                    document.getElementById('question-grid').innerHTML = questions.map(function(_, i) {
                        var isAnswered = answers[i].selectedAnswer !== null;
                        var isCurrent = i === currentIndex;
                        var cls = 'size-8 rounded-lg text-[11px] font-bold flex items-center justify-center cursor-pointer transition-all';
                        if (isCurrent) cls += ' bg-primary text-white shadow-lg shadow-primary/20';
                        else if (isAnswered) cls += ' bg-emerald-500 text-white';
                        else cls += ' bg-slate-100 text-slate-400 hover:bg-slate-200';
                        return '<button class="' + cls + '" onclick="window.__goToQuestion(' + i + ')">' + (i + 1) + '</button>';
                    }).join('');
                }

                window.__goToQuestion = function(idx) {
                    currentIndex = idx;
                    renderQuestion();
                };

                document.getElementById('prev-btn').addEventListener('click', function() {
                    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
                });

                document.getElementById('next-btn').addEventListener('click', function() {
                    if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); }
                    else {
                        var unanswered = answers.filter(function(a) { return !a.selectedAnswer; }).length;
                        var msg = 'Are you sure you want to submit your test?';
                        if (unanswered > 0) msg += ' You have ' + unanswered + ' unanswered question' + (unanswered > 1 ? 's' : '') + '.';
                        showModal('Submit Test', msg, function() { doSubmit(false); }, 'Submit', 'bg-primary hover:bg-indigo-600');
                    }
                });

                document.getElementById('submit-btn').addEventListener('click', function() {
                    var unanswered = answers.filter(function(a) { return !a.selectedAnswer; }).length;
                    var msg = 'Are you sure you want to submit your test?';
                    if (unanswered > 0) msg += ' You have ' + unanswered + ' unanswered question' + (unanswered > 1 ? 's' : '') + '.';
                    showModal('Submit Test', msg, function() { doSubmit(false); }, 'Submit', 'bg-primary hover:bg-indigo-600');
                });

                async function doSubmit(timedOut) {
                    timer.stop();
                    document.getElementById('submit-btn').disabled = true;
                    document.getElementById('submit-btn').innerHTML = '<span class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span> Submitting...';

                    try {
                        await submitAttempt(attemptId, answers, timedOut ? 0 : timer.remainingSeconds, timer.totalSeconds);
                        clearQuizState(attemptId);
                        try { localStorage.removeItem('quiz_attempt_' + testId); } catch(e) {}
                        if (timedOut) {
                            showToast('Time is up! Your test has been submitted.', 'warning');
                        }
                        setTimeout(function() {
                            navigateTo('/results.html?attemptId=' + attemptId);
                        }, timedOut ? 1500 : 300);
                    } catch (e) {
                        console.error('Submit error:', e);
                        showToast('Failed to submit. Retrying...', 'error');
                        try {
                            await submitAttempt(attemptId, answers, timedOut ? 0 : timer.remainingSeconds, timer.totalSeconds);
                            clearQuizState(attemptId);
                        try { localStorage.removeItem('quiz_attempt_' + testId); } catch(e) {}
                            navigateTo('/results.html?attemptId=' + attemptId);
                        } catch (e2) {
                            showToast('Submit failed. Your answers are saved locally.', 'error');
                            saveQuizState(attemptId, answers, timer.remainingSeconds, questions.map(function(q) { return q.id; }));
                        }
                    }
                }

                // Warn before leaving
                window.addEventListener('beforeunload', function(e) {
                    if (timer && timer.remainingSeconds > 0) {
                        e.preventDefault();
                        e.returnValue = '';
                    }
                });

            } catch (e) {
                console.error('Quiz page error:', e);
                showLoadError(e.message || String(e));
            }
        })();
    </script>
</body>
</html>
