<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeanTest - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' } } }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen flex">
    <aside id="sidebar" class="w-52 bg-white border-r border-slate-100 fixed h-screen overflow-y-auto"></aside>
    <div class="flex-1 ml-52">
        <header id="header" class="h-16 sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 z-40"></header>
        <main class="p-6 page-enter">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-lg font-bold text-slate-800">Users</h1>
                <button id="add-user-btn" class="bg-primary text-white px-4 py-2 rounded-xl text-[11px] font-bold hover:bg-indigo-600 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">person_add</span>
                    Add User
                </button>
            </div>

            <!-- Add User Form (hidden by default) -->
            <div id="add-user-form" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 mb-6 hidden">
                <h3 class="text-sm font-bold text-slate-800 mb-4">Create New User</h3>
                <form id="user-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Username</label>
                        <input type="text" id="new-username" required pattern="[a-zA-Z0-9_]+" title="Letters, numbers, and underscores only"
                            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="johndoe" />
                    </div>
                    <div>
                        <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Display Name</label>
                        <input type="text" id="new-displayname" required
                            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="John Doe" />
                    </div>
                    <div>
                        <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Password</label>
                        <input type="password" id="new-password" required minlength="6"
                            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="Min 6 characters" />
                    </div>
                    <div>
                        <label class="text-[10px] font-medium text-slate-400 uppercase tracking-wider block mb-1.5">Role</label>
                        <select id="new-role" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-[12px] focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none">
                            <option value="student">Student</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 flex items-center gap-3">
                        <button type="submit" id="create-user-btn" class="bg-primary text-white px-4 py-2 rounded-xl text-[11px] font-bold hover:bg-indigo-600 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px]">check</span>
                            Create User
                        </button>
                        <button type="button" id="cancel-add" class="border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-[11px] font-medium hover:bg-slate-50 transition-colors">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-slate-100">
                            <th class="text-left text-[10px] uppercase text-slate-400 font-medium tracking-wider p-4">User</th>
                            <th class="text-left text-[10px] uppercase text-slate-400 font-medium tracking-wider p-4">Username</th>
                            <th class="text-left text-[10px] uppercase text-slate-400 font-medium tracking-wider p-4">Role</th>
                            <th class="text-left text-[10px] uppercase text-slate-400 font-medium tracking-wider p-4">Status</th>
                            <th class="text-left text-[10px] uppercase text-slate-400 font-medium tracking-wider p-4">Created</th>
                            <th class="text-right text-[10px] uppercase text-slate-400 font-medium tracking-wider p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table"></tbody>
                </table>
                <div id="empty-users" class="hidden"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAdmin, createUser, BASE_PATH } from '../js/auth.js';
        import { renderAdminSidebar, renderHeader, initLogout, showToast, badge, emptyState } from '../js/ui.js';
        import { db } from '../js/firebase-config.js';
        import { collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js';

        initLogout();

        let adminUser;

        try {
            adminUser = await requireAdmin();
            document.getElementById('sidebar').innerHTML = renderAdminSidebar('users');
            document.getElementById('header').innerHTML = renderHeader(adminUser, 'Admin / Users');

            await loadUsers();
        } catch (e) {
            console.error(e);
        }

        // Toggle add user form
        document.getElementById('add-user-btn').addEventListener('click', () => {
            document.getElementById('add-user-form').classList.toggle('hidden');
        });
        document.getElementById('cancel-add').addEventListener('click', () => {
            document.getElementById('add-user-form').classList.add('hidden');
            document.getElementById('user-form').reset();
        });

        // Create user
        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('create-user-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span> Creating...';

            try {
                const username = document.getElementById('new-username').value.trim();
                const displayName = document.getElementById('new-displayname').value.trim();
                const password = document.getElementById('new-password').value;
                const role = document.getElementById('new-role').value;

                await createUser(username, password, displayName, role, adminUser.uid);
                showToast(`User "${username}" created successfully`, 'success');
                document.getElementById('user-form').reset();
                document.getElementById('add-user-form').classList.add('hidden');
                await loadUsers();
            } catch (err) {
                console.error(err);
                let msg = 'Failed to create user';
                if (err.code === 'auth/email-already-in-use') msg = 'Username already exists';
                if (err.code === 'auth/weak-password') msg = 'Password must be at least 6 characters';
                showToast(msg, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span> Create User';
            }
        });

        async function loadUsers() {
            const snap = await getDocs(collection(db, 'users'));
            const tbody = document.getElementById('users-table');
            const emptyEl = document.getElementById('empty-users');

            if (snap.empty) {
                tbody.innerHTML = '';
                emptyEl.classList.remove('hidden');
                emptyEl.innerHTML = emptyState('group', 'No users found');
                return;
            }

            emptyEl.classList.add('hidden');
            const users = [];
            snap.forEach(d => users.push({ id: d.id, ...d.data() }));
            users.sort((a, b) => (a.displayName || a.username).localeCompare(b.displayName || b.username));

            tbody.innerHTML = users.map(u => {
                const date = u.createdAt ? new Date(u.createdAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'N/A';
                return `
                    <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                        <td class="p-4">
                            <div class="flex items-center gap-3">
                                <div class="size-8 rounded-full ${u.role === 'admin' ? 'bg-indigo-50' : 'bg-slate-100'} flex items-center justify-center">
                                    <span class="material-symbols-outlined ${u.role === 'admin' ? 'text-primary' : 'text-slate-400'} text-[14px]">${u.role === 'admin' ? 'admin_panel_settings' : 'person'}</span>
                                </div>
                                <span class="text-[12px] font-medium text-slate-700">${u.displayName || u.username}</span>
                            </div>
                        </td>
                        <td class="p-4 text-[12px] text-slate-500">${u.username}</td>
                        <td class="p-4">${badge(u.role, u.role === 'admin' ? 'indigo' : 'blue')}</td>
                        <td class="p-4">${badge(u.isActive ? 'Active' : 'Inactive', u.isActive ? 'emerald' : 'red')}</td>
                        <td class="p-4 text-[12px] text-slate-500">${date}</td>
                        <td class="p-4 text-right">
                            ${u.uid !== adminUser.uid && u.id !== adminUser.uid ? `
                                <button onclick="window.__toggleUser('${u.id}', ${!u.isActive})" class="size-8 rounded-full hover:bg-slate-100 inline-flex items-center justify-center transition-colors" title="${u.isActive ? 'Deactivate' : 'Activate'}">
                                    <span class="material-symbols-outlined text-[16px] ${u.isActive ? 'text-slate-400' : 'text-emerald-500'}">${u.isActive ? 'block' : 'check_circle'}</span>
                                </button>
                            ` : ''}
                        </td>
                    </tr>`;
            }).join('');
        }

        window.__toggleUser = async (userId, newStatus) => {
            try {
                await updateDoc(doc(db, 'users', userId), { isActive: newStatus });
                showToast(`User ${newStatus ? 'activated' : 'deactivated'}`, 'success');
                await loadUsers();
            } catch (e) {
                showToast('Failed to update user', 'error');
            }
        };
    </script>
</body>
</html>
