<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeanTest - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' } } }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-52 bg-white border-r border-slate-100 fixed h-screen overflow-y-auto"></aside>

    <!-- Main -->
    <div class="flex-1 ml-52">
        <header id="header" class="h-16 sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 z-40"></header>
        <main class="p-6 page-enter">
            <!-- Stats Grid -->
            <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Recent Attempts -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Recent Attempts</h2>
                        <a id="all-results-link" href="#" class="text-[11px] text-primary font-medium hover:underline">View All</a>
                    </div>
                    <div id="recent-attempts" class="space-y-1"></div>
                </div>

                <!-- Test Overview -->
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Test Overview</h2>
                        <a id="all-tests-link" href="#" class="text-[11px] text-primary font-medium hover:underline">Manage Tests</a>
                    </div>
                    <div id="test-overview" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAdmin, BASE_PATH } from '../js/auth.js';
        import { renderAdminSidebar, renderHeader, initLogout, statCard, badge, emptyState } from '../js/ui.js';
        import { db } from '../js/firebase-config.js';
        import { collection, getDocs, query, orderBy, limit, where, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js';

        initLogout();

        try {
            const user = await requireAdmin();
            document.getElementById('sidebar').innerHTML = renderAdminSidebar('dashboard');
            document.getElementById('header').innerHTML = renderHeader(user, 'Admin / Dashboard');
            document.getElementById('all-results-link').href = `${BASE_PATH}/admin/results.html`;
            document.getElementById('all-tests-link').href = `${BASE_PATH}/admin/tests.html`;

            // Fetch counts
            const [usersSnap, questionsSnap, testsSnap, attemptsSnap] = await Promise.all([
                getDocs(collection(db, 'users')),
                getDocs(collection(db, 'questions')),
                getDocs(collection(db, 'tests')),
                getDocs(collection(db, 'attempts'))
            ]);

            const students = [];
            usersSnap.forEach(d => { if (d.data().role === 'student') students.push(d.data()); });

            const completedAttempts = [];
            attemptsSnap.forEach(d => {
                const data = d.data();
                if (data.status !== 'in_progress') completedAttempts.push({ id: d.id, ...data });
            });

            const avgScore = completedAttempts.length > 0
                ? Math.round(completedAttempts.reduce((s, a) => s + a.percentage, 0) / completedAttempts.length)
                : 0;

            document.getElementById('stats-grid').innerHTML = [
                statCard('group', students.length, 'Students'),
                statCard('help_outline', questionsSnap.size, 'Questions'),
                statCard('quiz', testsSnap.size, 'Tests'),
                statCard('percent', avgScore + '%', 'Avg Score')
            ].join('');

            // Build user lookup
            const userMap = {};
            usersSnap.forEach(d => { userMap[d.id] = d.data(); });

            // Build test lookup
            const testMap = {};
            testsSnap.forEach(d => { testMap[d.id] = d.data(); });

            // Recent attempts (sort by completedAt desc)
            const sorted = completedAttempts
                .filter(a => a.completedAt)
                .sort((a, b) => (b.completedAt?.seconds || 0) - (a.completedAt?.seconds || 0))
                .slice(0, 10);

            const recentEl = document.getElementById('recent-attempts');
            if (sorted.length === 0) {
                recentEl.innerHTML = emptyState('assessment', 'No attempts yet');
            } else {
                recentEl.innerHTML = sorted.map(a => {
                    const u = userMap[a.userId];
                    const t = testMap[a.testId];
                    const date = new Date(a.completedAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    return `
                        <div class="flex items-center justify-between py-2.5 px-3 rounded-lg hover:bg-slate-50 transition-colors border-b border-slate-50">
                            <div class="flex items-center gap-3">
                                <div class="size-8 rounded-full bg-primary/10 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-primary text-[14px]">person</span>
                                </div>
                                <div>
                                    <div class="text-[12px] font-medium text-slate-700">${u?.displayName || u?.username || 'Unknown'}</div>
                                    <div class="text-[10px] text-slate-400">${t?.name || 'Unknown Test'}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${badge(a.percentage + '%', a.percentage >= 70 ? 'emerald' : a.percentage >= 50 ? 'amber' : 'red')}
                                <span class="text-[10px] text-slate-400">${date}</span>
                            </div>
                        </div>`;
                }).join('');
            }

            // Test overview
            const testOverview = document.getElementById('test-overview');
            if (testsSnap.empty) {
                testOverview.innerHTML = emptyState('quiz', 'No tests created');
            } else {
                // Count questions per test
                const qCountByTest = {};
                questionsSnap.forEach(d => {
                    const data = d.data();
                    if (!qCountByTest[data.testId]) qCountByTest[data.testId] = { easy: 0, medium: 0, hard: 0 };
                    qCountByTest[data.testId][data.difficulty]++;
                });

                // Count attempts per test
                const aCountByTest = {};
                completedAttempts.forEach(a => {
                    aCountByTest[a.testId] = (aCountByTest[a.testId] || 0) + 1;
                });

                testOverview.innerHTML = testsSnap.docs.map(d => {
                    const test = d.data();
                    const qc = qCountByTest[d.id] || { easy: 0, medium: 0, hard: 0 };
                    const total = qc.easy + qc.medium + qc.hard;
                    const ac = aCountByTest[d.id] || 0;
                    return `
                        <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:shadow-sm transition-all">
                            <div>
                                <div class="text-[12px] font-bold text-slate-800">${test.name}</div>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[10px] text-slate-400">${total} questions</span>
                                    <span class="text-[10px] text-slate-400">${ac} attempts</span>
                                </div>
                            </div>
                            ${badge(test.isActive ? 'Active' : 'Inactive', test.isActive ? 'emerald' : 'slate')}
                        </div>`;
                }).join('');
            }

        } catch (e) {
            console.error(e);
        }
    </script>
</body>
</html>
