<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>LeanTest - My Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' } } }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen">
    <header id="header" class="h-16 sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 z-40"></header>

    <main class="max-w-5xl mx-auto px-6 py-8 page-enter">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-lg font-bold text-slate-800">My Progress</h1>
                <p class="text-[12px] text-slate-500 mt-1">Track your performance across all tests</p>
            </div>
            <a id="back-link" href="#" class="border border-slate-200 text-slate-500 px-4 py-2 rounded-xl text-[11px] font-medium hover:bg-slate-50 transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back to Tests
            </a>
        </div>

        <!-- Overall Stats -->
        <div id="overall-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

        <!-- Test Progress Cards -->
        <div class="mb-4">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Test History</h2>
        </div>
        <div id="test-progress" class="space-y-4"></div>
        <div id="empty-state" class="hidden"></div>
    </main>

    <script type="module">
        import { requireAuth, BASE_PATH } from './js/auth.js';
        import { renderStudentHeader, initLogout, statCard, badge, emptyState } from './js/ui.js';
        import { db } from './js/firebase-config.js';
        import { collection, query, where, getDocs, doc, getDoc, orderBy } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js';

        initLogout();

        try {
            const user = await requireAuth();
            document.getElementById('header').innerHTML = renderStudentHeader(user);
            document.getElementById('back-link').href = `${BASE_PATH}/dashboard.html`;

            // Fetch all attempts
            const attemptsSnap = await getDocs(query(
                collection(db, 'attempts'),
                where('userId', '==', user.uid)
            ));

            if (attemptsSnap.empty) {
                document.getElementById('overall-stats').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('empty-state').innerHTML = emptyState('trending_up', 'No attempts yet', 'Take a test to see your progress here');
                return;
            }

            const attempts = [];
            attemptsSnap.forEach(d => attempts.push({ id: d.id, ...d.data() }));
            const completed = attempts.filter(a => a.status !== 'in_progress');

            // Fetch test names
            const testIds = [...new Set(attempts.map(a => a.testId))];
            const testNames = {};
            await Promise.all(testIds.map(async id => {
                const d = await getDoc(doc(db, 'tests', id));
                testNames[id] = d.exists() ? d.data().name : 'Unknown Test';
            }));

            // Overall stats
            const totalAttempts = completed.length;
            const avgScore = totalAttempts > 0 ? Math.round(completed.reduce((s, a) => s + a.percentage, 0) / totalAttempts) : 0;
            const bestScore = totalAttempts > 0 ? Math.max(...completed.map(a => a.percentage)) : 0;
            const passRate = totalAttempts > 0 ? Math.round((completed.filter(a => a.percentage >= 70).length / totalAttempts) * 100) : 0;

            document.getElementById('overall-stats').innerHTML = [
                statCard('quiz', totalAttempts, 'Total Attempts'),
                statCard('percent', avgScore + '%', 'Average Score'),
                statCard('emoji_events', bestScore + '%', 'Best Score'),
                statCard('check_circle', passRate + '%', 'Pass Rate')
            ].join('');

            // Group by test
            const byTest = {};
            completed.forEach(a => {
                if (!byTest[a.testId]) byTest[a.testId] = [];
                byTest[a.testId].push(a);
            });

            // Sort each group by time
            Object.values(byTest).forEach(arr => {
                arr.sort((a, b) => {
                    const ta = a.completedAt?.seconds || 0;
                    const tb = b.completedAt?.seconds || 0;
                    return tb - ta;
                });
            });

            document.getElementById('test-progress').innerHTML = Object.entries(byTest).map(([testId, testAttempts]) => {
                const best = Math.max(...testAttempts.map(a => a.percentage));
                const avg = Math.round(testAttempts.reduce((s, a) => s + a.percentage, 0) / testAttempts.length);
                const latest = testAttempts[0];

                // Score trend bars (last 10)
                const trendAttempts = testAttempts.slice(0, 10).reverse();
                const trendBars = trendAttempts.map(a => {
                    const h = Math.max(4, a.percentage * 0.6);
                    const color = a.percentage >= 70 ? 'bg-emerald-500' : a.percentage >= 50 ? 'bg-amber-500' : 'bg-red-500';
                    return `<div class="flex flex-col items-center gap-1">
                        <div class="${color} rounded-sm" style="width: 16px; height: ${h}px"></div>
                        <span class="text-[8px] text-slate-400">${a.percentage}%</span>
                    </div>`;
                }).join('');

                return `
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 hover:shadow-md transition-all duration-300">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h3 class="text-sm font-bold text-slate-800">${testNames[testId]}</h3>
                                <p class="text-[10px] text-slate-400 mt-0.5">${testAttempts.length} attempt${testAttempts.length !== 1 ? 's' : ''}</p>
                            </div>
                            <a href="${BASE_PATH}/quiz.html?testId=${testId}" class="text-[11px] text-primary font-medium hover:underline flex items-center gap-1">
                                Retake <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
                            </a>
                        </div>
                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <div>
                                <div class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">Best</div>
                                <div class="text-lg font-bold ${best >= 70 ? 'text-emerald-600' : best >= 50 ? 'text-amber-600' : 'text-red-600'}">${best}%</div>
                            </div>
                            <div>
                                <div class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">Average</div>
                                <div class="text-lg font-bold text-slate-800">${avg}%</div>
                            </div>
                            <div>
                                <div class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">Latest</div>
                                <div class="text-lg font-bold text-slate-800">${latest.percentage}%</div>
                            </div>
                        </div>
                        ${trendAttempts.length > 1 ? `
                            <div class="border-t border-slate-100 pt-4">
                                <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Score Trend</div>
                                <div class="flex items-end gap-1.5">${trendBars}</div>
                            </div>
                        ` : ''}
                        <div class="border-t border-slate-100 pt-4 mt-4">
                            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Recent Attempts</div>
                            <div class="space-y-2">
                                ${testAttempts.slice(0, 5).map(a => {
                                    const date = a.completedAt ? new Date(a.completedAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'N/A';
                                    const min = Math.floor(a.timeTaken / 60);
                                    return `
                                        <a href="${BASE_PATH}/results.html?attemptId=${a.id}" class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-slate-50 transition-colors">
                                            <div class="flex items-center gap-3">
                                                ${badge(a.percentage + '%', a.percentage >= 70 ? 'emerald' : a.percentage >= 50 ? 'amber' : 'red')}
                                                <span class="text-[11px] text-slate-500">${a.score}/${a.totalQuestions} correct</span>
                                            </div>
                                            <div class="flex items-center gap-3 text-[10px] text-slate-400">
                                                <span>${min}m</span>
                                                <span>${date}</span>
                                                <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
                                            </div>
                                        </a>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>`;
            }).join('');

        } catch (e) {
            console.error(e);
        }
    </script>
</body>
</html>
